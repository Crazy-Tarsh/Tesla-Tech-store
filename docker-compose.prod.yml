services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI:?error: MONGODB_URI not set - add to .env.prod}
      - JWT_SECRET=${JWT_SECRET:?error: JWT_SECRET not set - add to .env.prod}
      - JWT_EXPIRES_IN=1d
      - COOKIE_EXPIRES_DAYS=1
      - SESSION_TIMEOUT_MINUTES=30
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
    networks:
      - tesla-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - tesla-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  tesla-network:
    driver: bridge
