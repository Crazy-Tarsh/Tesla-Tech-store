name: Docker Build & Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: tesla-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: tesla-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start services with docker-compose
        run: |
          docker compose up -d
          sleep 10

      - name: Wait for server health
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:5000/api/health; then
              echo "Server is healthy"
              exit 0
            fi
            echo "Attempt $i/30 - waiting for server..."
            sleep 2
          done
          echo "Server failed to become healthy"
          exit 1

      - name: Wait for client
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000/health; then
              echo "Client is healthy"
              exit 0
            fi
            echo "Attempt $i/30 - waiting for client..."
            sleep 2
          done
          echo "Client failed to become healthy"
          exit 1

      - name: Run server health check
        run: curl -v http://localhost:5000/api/health

      - name: Check container logs on failure
        if: failure()
        run: |
          docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down
