services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - PORT=5000
      - CLIENT_URL=http://localhost:3000
    volumes:
      - ./server/src:/app/src
    develop:
      watch:
        - action: sync
          path: ./server/src
          target: /app/src
    networks:
      - tesla-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    develop:
      watch:
        - action: sync
          path: ./client/src
          target: /app/src
        - action: sync
          path: ./client/public
          target: /app/public
    networks:
      - tesla-network
    restart: unless-stopped

networks:
  tesla-network:
    driver: bridge
