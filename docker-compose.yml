services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: tesla_marketplace
    volumes:
      - mongodb_data:/data/db
    networks:
      - tesla-network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/tesla_marketplace --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/tesla_marketplace
      - JWT_SECRET=dev-secret-key-change-in-production
      - JWT_EXPIRES_IN=1d
      - COOKIE_EXPIRES_DAYS=1
      - SESSION_TIMEOUT_MINUTES=30
      - CLIENT_URL=http://localhost:3000
    volumes:
      - ./server/src:/app/src
    develop:
      watch:
        - action: sync
          path: ./server/src
          target: /app/src
    networks:
      - tesla-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    develop:
      watch:
        - action: sync
          path: ./client/src
          target: /app/src
        - action: sync
          path: ./client/public
          target: /app/public
    networks:
      - tesla-network
    restart: unless-stopped

networks:
  tesla-network:
    driver: bridge

volumes:
  mongodb_data:
